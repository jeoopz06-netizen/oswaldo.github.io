<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, Arial;
    }
    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,.4);
    }
    h2 {
      margin-top: 0;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #020617;
      color: white;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #16a34a;
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Iniciar sesión</h2>

    <input id="email" type="email" placeholder="Correo electrónico" />
    <input id="password" type="password" placeholder="Contraseña" />

    <button id="loginBtn">Entrar</button>

    <div id="msg" class="msg"></div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://xsmxwjpgjfipxkgocitc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzbXh3anBnamZpcHhrZ29jaXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjAwMjUsImV4cCI6MjA4NjgzNjAyNX0.KTWje5RPDXGChabHjeIEYwgygX_z58p0FpBmdA6cWD4";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const msg = document.getElementById("msg");

/* Elementos que agregaremos debajo del login */
const mfaBox = document.createElement("div");
mfaBox.style.display = "none";
mfaBox.innerHTML = `
  <h3>Verificación en dos pasos</h3>
  <img id="qrImg" style="max-width:180px; display:none; margin:10px auto;" />
  <input id="totpCode" placeholder="Código de Google Authenticator" />
  <button id="verifyBtn">Verificar</button>
`;
document.querySelector(".login-box").appendChild(mfaBox);

const qrImg = document.getElementById("qrImg");
const totpInput = document.getElementById("totpCode");
const verifyBtn = document.getElementById("verifyBtn");

let currentFactorId = null;

/* ========= LOGIN ========= */
document.getElementById("loginBtn").onclick = async () => {
  msg.textContent = "Iniciando sesión…";

  const { error } = await sb.auth.signInWithPassword({
    email: emailInput.value.trim(),
    password: passInput.value
  });

  if (error) {
    msg.textContent = error.message;
    msg.style.color = "#f87171";
    return;
  }

  // Ver si el usuario ya tiene 2FA
  const { data: factors } = await sb.auth.mfa.listFactors();
  const totpFactors = factors?.totp || [];

  if (totpFactors.length > 0) {
    // Ya tiene 2FA → pedir código
    currentFactorId = totpFactors[0].id;
    mfaBox.style.display = "block";
    qrImg.style.display = "none";
    msg.textContent = "Ingresa el código de Google Authenticator";
  } else {
    // NO tiene 2FA → crear QR
    const { data, error: enrollError } = await sb.auth.mfa.enroll({
      factorType: "totp"
    });

    if (enrollError) {
      msg.textContent = enrollError.message;
      return;
    }

    currentFactorId = data.id;
    qrImg.src = data.totp.qr_code;
    qrImg.style.display = "block";
    mfaBox.style.display = "block";
    msg.textContent = "Escanea el QR y escribe el código";
  }
};

/* ========= VERIFICAR CÓDIGO ========= */
verifyBtn.onclick = async () => {
  const code = totpInput.value.trim();
  if (!code || !currentFactorId) return;

  // Crear reto
  const { data: challenge, error: chError } =
    await sb.auth.mfa.challenge({ factorId: currentFactorId });

  if (chError) {
    msg.textContent = chError.message;
    return;
  }

  // Verificar código
  const { error: verifyError } =
    await sb.auth.mfa.verify({
      factorId: currentFactorId,
      challengeId: challenge.id,
      code: code
    });

  if (verifyError) {
    msg.textContent = "Código incorrecto";
    return;
  }

  // ✅ Listo
  msg.textContent = "Verificación correcta ✅";
  window.location.href = "index.html";
};
</script>

</body>
</html>
